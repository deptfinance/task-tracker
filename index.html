<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT AI — Task Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0d1117;
  min-height: 100vh;
  color: #e6edf3;
  padding: 24px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; padding: 32px 20px 24px; }
.header h1 { font-size: 2.5rem; font-weight: 800; color: #f0f6fc; letter-spacing: -0.5px; }
.header h1 span {
  background: linear-gradient(135deg, #58a6ff, #bc8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p { color: #8b949e; font-size: 1rem; margin-top: 8px; }
.divider { height: 2px; background: linear-gradient(90deg, transparent, #30363d, transparent); margin: 16px 0 24px; }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 18px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 4px solid var(--accent, #58a6ff);
}
.stat-card:hover { background: #1c2333; border-color: var(--accent, #58a6ff); transform: translateY(-2px); }
.stat-card.active {
  background: rgba(88,166,255,0.08);
  border-color: var(--accent, #58a6ff);
  box-shadow: 0 0 0 1px var(--accent, #58a6ff);
}
.stat-card .emoji { font-size: 1.5rem; margin-bottom: 4px; }
.stat-card .label { font-size: 0.8rem; color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .count { font-size: 1.8rem; font-weight: 800; color: #f0f6fc; margin-top: 2px; }
.stat-card .tasks-total { font-size: 0.75rem; color: #484f58; margin-top: 2px; }

.stat-card[data-divisi="Finance"] { --accent: #ff7b72; }
.stat-card[data-divisi="Accounting"] { --accent: #d2a8ff; }
.stat-card[data-divisi="Perpajakan"] { --accent: #7ee787; }
.stat-card[data-divisi="Legal & Admin"] { --accent: #79c0ff; }
.stat-card[data-divisi="Semua"] { --accent: #ffa657; }

.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-bar {
  flex: 1;
  min-width: 220px;
  padding: 12px 16px;
  border: 1px solid #30363d;
  border-radius: 8px;
  background: #161b22;
  color: #e6edf3;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s;
}
.search-bar:focus { outline: none; border-color: #58a6ff; }
.search-bar::placeholder { color: #484f58; }

.btn {
  padding: 12px 20px;
  border: 1px solid #30363d;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  background: #21262d;
  color: #e6edf3;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: #30363d; border-color: #8b949e; }
.btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
.btn-danger:hover { background: #f85149; }
.btn-add { background: #1f6feb; border-color: #388bfd; color: #fff; }
.btn-add:hover { background: #388bfd; }

.employee-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.emp-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.emp-card:hover { border-color: #8b949e; background: #1c2333; }
.emp-card .name { font-weight: 600; font-size: 1rem; color: #f0f6fc; }
.emp-card .divisi-tag {
  display: inline-block;
  font-size: 0.7rem;
  padding: 2px 10px;
  border-radius: 20px;
  margin-top: 6px;
  font-weight: 600;
  color: #fff;
}
.emp-card .task-count { font-size: 0.8rem; color: #8b949e; margin-top: 6px; }

.task-panel {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  display: none;
}
.task-panel.open { display: block; }
.task-panel .emp-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid #30363d;
}
.task-panel .emp-header h3 { font-size: 1.3rem; font-weight: 700; color: #f0f6fc; }
.task-panel .emp-header .divisi-tag {
  font-size: 0.75rem;
  padding: 4px 14px;
  border-radius: 20px;
  font-weight: 600;
  color: #fff;
}

.task-card {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.task-card .task-title { font-weight: 700; font-size: 1rem; color: #f0f6fc; margin-bottom: 8px; }
.task-card .task-prompt { font-size: 0.9rem; color: #c9d1d9; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }
.task-card .task-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #58a6ff;
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  padding: 6px 12px;
  background: rgba(88,166,255,0.08);
  border-radius: 6px;
  transition: background 0.2s;
}
.task-card .task-link:hover { background: rgba(88,166,255,0.15); }

.empty { text-align: center; padding: 60px 20px; color: #484f58; }
.empty .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty p { font-size: 1rem; }

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 550px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal h3 { font-size: 1.2rem; font-weight: 700; color: #f0f6fc; margin-bottom: 16px; }
.modal label { display: block; font-size: 0.85rem; font-weight: 600; color: #c9d1d9; margin-bottom: 4px; margin-top: 14px; }
.modal input, .modal select, .modal textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #30363d;
  border-radius: 8px;
  background: #0d1117;
  color: #e6edf3;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: #58a6ff; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  background: #238636;
  color: #fff;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 2000;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: #da3633; }

.tag-finance { background: #ff7b72; }
.tag-accounting { background: #d2a8ff; }
.tag-perpajakan { background: #7ee787; color: #0d1117 !important; }
.tag-legal { background: #79c0ff; color: #0d1117 !important; }

@media (max-width: 600px) {
  body { padding: 12px; }
  .header h1 { font-size: 1.6rem; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 14px 10px; }
  .stat-card .count { font-size: 1.4rem; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>PROMPT <span>AI</span></h1>
  <p>Task Management & Prompt Tracker</p>
</div>
<div class="divider"></div>
<div class="stats" id="statsContainer"></div>
<div class="toolbar">
  <input type="text" class="search-bar" id="searchInput" placeholder="Cari karyawan..." oninput="renderEmployees()">
  <button class="btn btn-add" onclick="openModal('add')">+ Tambah</button>
  <button class="btn" onclick="exportData()">Export</button>
  <button class="btn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn btn-danger" onclick="if(confirm('Hapus SEMUA data?')){localStorage.removeItem('promptAiData');location.reload();}">Reset</button>
</div>
<div id="employeeGrid" class="employee-grid"></div>
<div id="taskPanel" class="task-panel"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Tambah Data</h3>
    <label>Divisi
      <select id="modalDivisi">
        <option value="Finance">Finance</option>
        <option value="Accounting">Accounting</option>
        <option value="Perpajakan">Perpajakan</option>
        <option value="Legal & Admin">Legal & Admin</option>
      </select>
    </label>
    <label>Nama Karyawan <input type="text" id="modalNama" placeholder="Nama lengkap"></label>
    <label>Judul Tugas <input type="text" id="modalJudul" placeholder="Contoh: Laporan Arus Kas Harian"></label>
    <label>Prompt Tugas <textarea id="modalPrompt" placeholder="Deskripsi tugas / prompt ..."></textarea></label>
    <label>Link Google Drive <input type="url" id="modalLink" placeholder="https://drive.google.com/..."></label>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveModal()">Simpan</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const DEFAULT_DATA = {
  divisions: {
    "Finance": [
      { name: "Rina Amelia", tasks: [
        { title: "Laporan Arus Kas Harian", prompt: "Buat laporan arus kas harian dari data transaksi yang sudah diinput. Format: Tanggal, Uang Masuk, Uang Keluar, Saldo Akhir.", link: "https://drive.google.com" },
        { title: "Rekonsiliasi Bank", prompt: "Cocokkan saldo bank dengan catatan internal. Tandai perbedaan dan buat jurnal penyesuaian.", link: "https://drive.google.com" }
      ]},
      { name: "Budi Santoso", tasks: [
        { title: "Laporan Hutang-Piutang", prompt: "Buat daftar piutang yang jatuh tempo minggu ini. Sertakan nama customer, jumlah, dan status.", link: "https://drive.google.com" }
      ]}
    ],
    "Accounting": [
      { name: "Dewi Lestari", tasks: [
        { title: "Jurnal Penyesuaian Akhir Bulan", prompt: "Buat jurnal penyesuaian akhir bulan. Cek: beban dibayar dimuka, penyusutan, pendapatan diterima dimuka.", link: "https://drive.google.com" }
      ]}
    ],
    "Perpajakan": [
      { name: "Ahmad Fauzi", tasks: [
        { title: "Perhitungan PPh 21", prompt: "Hitung PPh 21 karyawan tetap bulan ini. Gunakan tarif progresif Pasal 17. Sertikan PTKP masing-masing.", link: "https://drive.google.com" },
        { title: "Laporan PPN Masa", prompt: "Rekap faktur pajak masukan dan keluaran. Hitung PPN kurang/lebih bayar.", link: "https://drive.google.com" }
      ]}
    ],
    "Legal & Admin": [
      { name: "Maya Wijaya", tasks: [
        { title: "Draft Perjanjian Kerjasama", prompt: "Buat draft perjanjian kerjasama antara PT HongYi dengan vendor. Sertakan klausul: lingkup kerja, harga, termin pembayaran, force majeure.", link: "https://drive.google.com" }
      ]}
    ]
  }
};

let data = JSON.parse(localStorage.getItem('promptAiData'));
if (!data || !data.divisions) { data = JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); }

let activeFilter = null;
let selectedEmployee = null;
let editingMode = null;
let editingEmployeeIndex = null;
let editingTaskIndex = null;

function saveData() { localStorage.setItem('promptAiData', JSON.stringify(data)); }

function getAllEmployees() {
  const list = [];
  for (const [divisi, employees] of Object.entries(data.divisions))
    for (const emp of employees) list.push({ ...emp, divisi });
  return list;
}

function getDivisionCounts() {
  const counts = {};
  for (const [divisi, employees] of Object.entries(data.divisions)) {
    let totalTasks = 0;
    for (const emp of employees) totalTasks += (emp.tasks || []).length;
    counts[divisi] = { karyawan: employees.length, tasks: totalTasks };
  }
  return counts;
}

function renderStats() {
  const container = document.getElementById('statsContainer');
  const counts = getDivisionCounts();
  const allTotal = Object.values(counts).reduce((a,b) => a + b.tasks, 0);
  const allKaryawan = Object.values(counts).reduce((a,b) => a + b.karyawan, 0);
  const emojiMap = { "Finance":"Finance","Accounting":"Accounting","Perpajakan":"Perpajakan","Legal & Admin":"Legal & Admin" };
  let html = '<div class="stat-card '+(activeFilter===null?'active':'')+'" data-divisi="Semua" onclick="setFilter(null)"><div class="emoji">Semua</div><div class="label">Divisi</div><div class="count">'+allKaryawan+'</div><div class="tasks-total">'+allTotal+' tugas</div></div>';
  for (const [divisi, c] of Object.entries(counts))
    html += '<div class="stat-card '+(activeFilter===divisi?'active':'')+'" data-divisi="'+divisi+'" onclick="setFilter(\''+divisi+'\')"><div class="emoji">'+divisi+'</div><div class="label">Karyawan</div><div class="count">'+c.karyawan+'</div><div class="tasks-total">'+c.tasks+' tugas</div></div>';
  container.innerHTML = html;
}

function setFilter(divisi) {
  activeFilter = divisi;
  document.getElementById('taskPanel').classList.remove('open');
  selectedEmployee = null;
  renderStats(); renderEmployees();
}

const tagColors = { "Finance":"tag-finance","Accounting":"tag-accounting","Perpajakan":"tag-perpajakan","Legal & Admin":"tag-legal" };

function renderEmployees() {
  const grid = document.getElementById('employeeGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let employees = getAllEmployees();
  if (activeFilter) employees = employees.filter(e => e.divisi === activeFilter);
  if (search) employees = employees.filter(e => e.name.toLowerCase().includes(search));
  if (employees.length === 0) { grid.innerHTML = '<div class="empty"><div class="emoji">No Data</div><p>Belum ada data. Klik "Tambah" untuk mulai.</p></div>'; return; }
  let html = '';
  employees.forEach((emp) => {
    const isSel = selectedEmployee && selectedEmployee.name === emp.name && selectedEmployee.divisi === emp.divisi;
    html += '<div class="emp-card" onclick="selectEmployee(\''+emp.divisi+'\',\''+emp.name+'\')"><div class="name">'+emp.name+'</div><div><span class="divisi-tag '+(tagColors[emp.divisi]||'tag-finance')+'">'+emp.divisi+'</span></div><div class="task-count">'+(emp.tasks||[]).length+' tugas</div></div>';
  });
  grid.innerHTML = html;
}

function selectEmployee(divisi, name) {
  const emp = data.divisions[divisi].find(e => e.name === name);
  if (!emp) return;
  selectedEmployee = { ...emp, divisi };
  renderEmployees();
  const panel = document.getElementById('taskPanel');
  let html = '<div class="emp-header"><div><h3>'+emp.name+'</h3><span class="divisi-tag '+(tagColors[divisi]||'tag-finance')+'">'+divisi+'</span></div><div style="display:flex;gap:8px"><button class="btn btn-add" onclick="openModal(\'add-task\',\''+divisi+'\',\''+name+'\')">+ Tugas</button><button class="btn btn-danger" onclick="deleteEmployee(\''+divisi+'\',\''+name+'\')">Hapus</button><button class="btn" onclick="closePanel()">Tutup</button></div></div>';
  const tasks = emp.tasks || [];
  if (tasks.length === 0) html += '<div class="empty"><div class="emoji">Tasks</div><p>Belum ada tugas. Klik "+ Tugas" untuk menambah.</p></div>';
  else tasks.forEach((task, idx) => {
    html += '<div class="task-card"><div class="task-title">'+task.title+'</div><div class="task-prompt">'+(task.prompt||'-')+'</div>'+(task.link?'<a href="'+task.link+'" target="_blank" class="task-link">Buka Google Drive</a>':'')+'<div style="margin-top:10px;display:flex;gap:6px"><button class="btn" onclick="openModal(\'edit-task\',\''+divisi+'\',\''+name+'\','+idx+')" style="padding:6px 14px;font-size:0.75rem">Edit</button><button class="btn btn-danger" onclick="deleteTask(\''+divisi+'\',\''+name+'\','+idx+')" style="padding:6px 14px;font-size:0.75rem">Hapus</button></div></div>';
  });
  panel.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() { document.getElementById('taskPanel').classList.remove('open'); selectedEmployee = null; renderEmployees(); }

function openModal(mode, divisi, name, taskIdx) {
  editingMode = mode;
  document.getElementById('modalTitle').textContent = mode==='add'?'Tambah Data':mode==='add-task'?'Tambah Tugas':mode==='edit-task'?'Edit Tugas':'Edit Karyawan';
  document.getElementById('modalDivisi').value = divisi||'Finance';
  document.getElementById('modalNama').value = name||'';
  document.getElementById('modalJudul').value = '';
  document.getElementById('modalPrompt').value = '';
  document.getElementById('modalLink').value = '';
  document.getElementById('modalNama').disabled = false;
  document.getElementById('modalJudul').parentElement.style.display = '';
  document.getElementById('modalPrompt').parentElement.style.display = '';
  document.getElementById('modalLink').parentElement.style.display = '';
  if (mode==='add-task'||mode==='edit-task') {
    document.getElementById('modalNama').value = name;
    document.getElementById('modalNama').disabled = true;
    editingEmployeeIndex = data.divisions[divisi].findIndex(e => e.name === name);
    if (mode==='edit-task') {
      const task = data.divisions[divisi][editingEmployeeIndex].tasks[taskIdx];
      document.getElementById('modalJudul').value = task.title;
      document.getElementById('modalPrompt').value = task.prompt||'';
      document.getElementById('modalLink').value = task.link||'';
      editingTaskIndex = taskIdx;
    }
  } else if (mode==='edit-employee') {
    document.getElementById('modalJudul').parentElement.style.display = 'none';
    document.getElementById('modalPrompt').parentElement.style.display = 'none';
    document.getElementById('modalLink').parentElement.style.display = 'none';
    editingEmployeeIndex = data.divisions[divisi].findIndex(e => e.name === name);
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveModal() {
  const divisi = document.getElementById('modalDivisi').value;
  const nama = document.getElementById('modalNama').value.trim();
  const judul = document.getElementById('modalJudul').value.trim();
  const prompt = document.getElementById('modalPrompt').value.trim();
  const link = document.getElementById('modalLink').value.trim();
  if (!nama && editingMode!=='edit-task') { showToast('Nama harus diisi', true); return; }
  if (!data.divisions[divisi]) data.divisions[divisi] = [];
  if (editingMode==='add') { data.divisions[divisi].push({name:nama,tasks:judul?[{title:judul,prompt,link}]:[]}); showToast('Data ditambahkan'); }
  else if (editingMode==='add-task') { data.divisions[divisi][editingEmployeeIndex].tasks.push({title:judul,prompt,link}); showToast('Tugas ditambahkan'); }
  else if (editingMode==='edit-employee') { data.divisions[divisi][editingEmployeeIndex].name = nama; showToast('Nama diperbarui'); }
  else if (editingMode==='edit-task') { data.divisions[divisi][editingEmployeeIndex].tasks[editingTaskIndex] = {title:judul,prompt,link}; showToast('Tugas diperbarui'); }
  saveData(); closeModal(); renderStats(); renderEmployees();
  if (selectedEmployee) selectEmployee(selectedEmployee.divisi, selectedEmployee.name);
}

function deleteEmployee(divisi, name) {
  if (!confirm('Hapus '+name+'?')) return;
  data.divisions[divisi] = data.divisions[divisi].filter(e => e.name !== name);
  if (data.divisions[divisi].length===0) delete data.divisions[divisi];
  saveData(); selectedEmployee = null; document.getElementById('taskPanel').classList.remove('open');
  renderStats(); renderEmployees(); showToast('Data dihapus');
}

function deleteTask(divisi, name, taskIdx) {
  if (!confirm('Hapus tugas ini?')) return;
  data.divisions[divisi].find(e => e.name === name).tasks.splice(taskIdx, 1);
  saveData(); selectEmployee(divisi, name); renderStats(); showToast('Tugas dihapus');
}

function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'prompt-ai-data.json'; a.click();
  URL.revokeObjectURL(url); showToast('Data di-download');
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.divisions) { showToast('Format file salah', true); return; }
      data = imported; saveData(); location.reload();
    } catch(err) { showToast('File tidak valid', true); }
  };
  reader.readAsText(file); event.target.value = '';
}

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError?' error':'');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

renderStats(); renderEmployees();
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
</script>
</body>
</html>
