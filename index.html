<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT AI — Task Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #10b981;
  --primary-dark: #059669;
  --accent: #0ea5e9;
  --accent-light: #e0f2fe;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #78716c;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
  --shadow-md: 0 4px 6px rgba(15, 23, 42, 0.07);
  --shadow-lg: 0 10px 15px rgba(15, 23, 42, 0.1);
  --shadow-xl: 0 20px 25px rgba(15, 23, 42, 0.12);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
    --border: #334155;
  }
  .hero-art svg { filter: drop-shadow(0 4px 12px rgba(16, 185, 129, 0.25)); }
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text-primary);
  padding: 24px;
  position: relative;
  overflow-x: hidden;
  transition: background 0.3s ease;
}

.container { max-width: 1400px; margin: 0 auto; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 32px 20px 24px;
  position: relative;
}
.hero-art {
  max-width: 180px;
  margin: 0 auto 18px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.hero-art svg {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 4px 12px rgba(16, 185, 129, 0.12));
}
.header h1 {
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text-primary);
  position: relative;
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header h1::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
  border-radius: 2px;
  filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.2));
  background-size: 200% 100%;
  animation: shimmer 2.5s ease-in-out infinite;
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.header p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  margin-top: 18px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.header .badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 0.8rem;
  padding: 8px 20px;
  border-radius: 24px;
  margin-top: 14px;
  font-weight: 600;
  border: 1px solid rgba(14, 165, 233, 0.2);
  backdrop-filter: blur(8px);
  animation: pulseBadge 3s ease-in-out infinite;
}
@keyframes pulseBadge {
  0%, 100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.1); }
  50% { box-shadow: 0 0 0 8px rgba(14, 165, 233, 0); }
}
.divider {
  height: 2px;
  background: linear-gradient(90deg, var(--border) 0%, transparent 50%, var(--border) 100%);
  margin: 24px 0 28px;
  border-radius: 1px;
}

/* ── LOADING ── */
.loading-wrap {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-secondary);
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
  box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 28px;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-sm);
}
.search-box:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1), var(--shadow-md);
  transform: translateY(-1px);
}
.search-box::placeholder { color: var(--text-tertiary); }

.toolbar .btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  padding: 11px 22px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.toolbar .btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(16, 185, 129, 0.1);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}
.toolbar .btn:hover::before {
  width: 300px;
  height: 300px;
}
.toolbar .btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.toolbar .btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none;
  color: #fff;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
}
.toolbar .btn.primary:hover {
  box-shadow: var(--shadow-xl);
  transform: translateY(-3px);
  filter: brightness(1.05);
}
.toolbar .btn.danger { color: #dc2626; border-color: #fecaca; }
.toolbar .btn.danger:hover { background: #fef2f2; border-color: #dc2626; color: #b91c1c; transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.toolbar .total-count { color: var(--text-secondary); font-size: 0.85rem; margin-left: auto; white-space: nowrap; font-weight: 500; }

/* ── STATS CARDS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-left: 5px solid var(--accent, var(--primary));
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent, var(--primary)), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.stat-card:hover::before {
  opacity: 1;
}
.stat-card:hover {
  border-color: var(--accent, var(--primary));
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.stat-card.active {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(14, 165, 233, 0.05));
  border-color: var(--accent, var(--primary));
  box-shadow: 0 0 0 2px var(--accent, var(--primary)), var(--shadow-md);
}
.stat-card .label { font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .count { font-size: 1.8rem; font-weight: 800; color: var(--accent, var(--primary)); margin: 8px 0; line-height: 1; }
.stat-card .sub { font-size: 0.72rem; color: var(--text-tertiary); font-weight: 500; }

/* ── EMPLOYEE GRID ── */
.employee-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.emp-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.emp-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.emp-card:hover::after {
  transform: scaleX(1);
}
.emp-card:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.emp-card.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(14, 165, 233, 0.05));
  box-shadow: 0 0 0 2px var(--primary), var(--shadow-md);
}
.emp-card .avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.95rem;
  color: #fff; flex-shrink: 0;
  box-shadow: var(--shadow-md);
  position: relative;
}
.emp-card .avatar::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  pointer-events: none;
}
.emp-card .info { flex: 1; min-width: 0; }
.emp-card .name { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-card .dept { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; font-weight: 500; }
.emp-card .task-count {
  font-size: 0.75rem;
  color: var(--primary);
  flex-shrink: 0;
  background: rgba(16, 185, 129, 0.1);
  padding: 5px 12px;
  border-radius: 8px;
  font-weight: 700;
  border: 1px solid rgba(16, 185, 129, 0.2);
}

/* ── TASK PANEL ── */
.task-panel {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  margin-top: 24px;
  display: none;
  box-shadow: var(--shadow-xl);
}
.task-panel.visible { display: block; animation: panelSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes panelSlide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-panel .panel-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}
.task-panel .panel-header h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
.task-panel .panel-header .dept-tag {
  font-size: 0.75rem;
  padding: 8px 16px;
  border-radius: 12px;
  font-weight: 700;
  color: #fff;
  box-shadow: var(--shadow-md);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.task-panel .panel-header .btn-close {
  background: var(--accent-light);
  border: 1px solid rgba(14, 165, 233, 0.3);
  color: var(--accent);
  font-size: 1.2rem;
  cursor: pointer;
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 600;
}
.task-panel .panel-header .btn-close:hover {
  background: #fecaca;
  border-color: #dc2626;
  color: #dc2626;
  transform: rotate(90deg);
}

.task-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.task-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--primary), var(--accent));
  border-radius: 0;
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.task-card:hover::before {
  transform: scaleY(1);
}
.task-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-lg);
  transform: translateX(2px);
}
.task-card .task-title { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.task-card .task-num {
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 12px;
  display: inline-block;
  background: var(--accent-light);
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid rgba(14, 165, 233, 0.2);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.task-card .task-prompt { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; white-space: pre-wrap; }
.task-card .task-link {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 9px 16px; border-radius: 10px;
  font-size: 0.8rem; text-decoration: none;
  border: 1.5px solid rgba(14, 165, 233, 0.2);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 600;
}
.task-card .task-link:hover {
  background: #e0f2fe;
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.task-card .task-link:focus {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.task-card .task-actions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.task-card .task-actions button {
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.task-card .task-actions button:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(16, 185, 129, 0.05);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.task-card .task-actions button:focus {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* ── MODAL ── */
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 23, 42, 0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal.open { display: flex; }
.modal-content {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  width: 90%; max-width: 560px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-xl);
  animation: modalIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-content h3 { font-size: 1.4rem; font-weight: 800; color: var(--text-primary); margin-bottom: 24px; }
.modal-content label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.4px; }
.modal-content input,.modal-content textarea,.modal-content select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text-primary);
  font-size: 0.85rem; outline: none; font-family: inherit;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1), var(--shadow-md);
  transform: translateY(-1px);
}
.modal-content textarea { min-height: 90px; resize: vertical; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; flex-wrap: wrap; }
.modal-actions button {
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  padding: 11px 24px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-actions button:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(16, 185, 129, 0.05);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.modal-actions button:focus {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}
.modal-actions button.primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none; color: #fff; font-weight: 700;
  box-shadow: var(--shadow-lg);
}
.modal-actions button.primary:hover {
  box-shadow: var(--shadow-xl);
  transform: translateY(-3px);
  filter: brightness(1.05);
}
.modal-actions button.danger { color: #dc2626; border-color: #fecaca; }
.modal-actions button.danger:hover { background: #fef2f2; border-color: #dc2626; color: #b91c1c; transform: translateY(-2px); box-shadow: var(--shadow-md); }

.file-input-wrap { position: relative; }
.file-input-wrap input[type=file] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; transition: background 0.3s ease; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

@media (max-width: 600px) {
  body { padding: 14px; }
  .header { padding: 32px 16px 20px; }
  .header h1 { font-size: 2.2rem; }
  .header p { font-size: 0.95rem; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .employee-grid { grid-template-columns: 1fr; gap: 10px; }
  .toolbar { flex-direction: column; gap: 10px; }
  .toolbar .search-box { width: 100%; }
  .toolbar .btn { width: 100%; }
  .toolbar .total-count { margin-left: 0; text-align: center; }
  .task-panel { padding: 20px; }
  .modal-content { padding: 24px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}

/* ── LANGUAGE TOGGLE ── */
.lang-zh .id { display: none; }
.lang-zh .zh { display: inline !important; }
.zh { display: none; }
</style>
</head>

<div class="container">

<div class="header">
  <div class="hero-art">
    <svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>

        </linearGradient>
        <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10b981"/>
          <stop offset="100%" stop-color="#0ea5e9"/>
        </linearGradient>
      </defs>
      <!-- Background shape -->
      <rect x="10" y="15" width="180" height="90" rx="16" fill="url(#g1)" stroke="url(#g2)" stroke-width="1.5"/>

      <circle cx="50" cy="55" r="18" fill="#10b981" fill-opacity="0.12"/>

      <rect x="78" y="45" width="40" height="3" rx="1.5" fill="#10b981" fill-opacity="0.3"/>
      <rect x="78" y="55" width="30" height="3" rx="1.5" fill="#0ea5e9" fill-opacity="0.2"/>
      <rect x="78" y="65" width="35" height="3" rx="1.5" fill="#10b981" fill-opacity="0.15"/>

  <h1>PROMPT AI</h1>
  <p>Kelola Tugas & Prompt Karyawan<span class="zh">｜管理員工任務與提示詞</span></p>
  <div class="badge" id="headerCount">Memuat data...<span class="zh">資料載入中...</span></div>
</div>
<div class="divider"></div>

<div class="toolbar">
  <input class="search-box" id="searchBox" placeholder="Cari nama karyawan..." oninput="renderEmployees()">
  <button class="btn primary" onclick="openModal('add')">+ Tambah<span class="zh">+ 新增</span></button>
  <button class="btn" onclick="exportData()">Export JSON<span class="zh">匯出 JSON</span></button>
  <span class="file-input-wrap">
    <button class="btn">Import JSON<span class="zh">匯入 JSON</span></button>
    <input type="file" accept=".json" onchange="importData(event)">
  </span>
  <button class="btn" id="langToggle" onclick="toggleLang()" style="min-width:55px">中文</button>
  <span class="total-count" id="totalCount"></span>
</div>

<div id="loadingWrap" class="loading-wrap">
  <div class="spinner"></div>
  <div>Memuat data dari Airtable...<span class="zh">正在從 Airtable 載入資料...</span></div>
</div>
<div class="stats" id="statsContainer" style="display:none"></div>
<div class="employee-grid" id="empGrid" style="display:none"></div>
<div class="task-panel" id="taskPanel"></div>
</div>

<!-- MODAL ADD/EDIT -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Tambah Karyawan</h3>
    <label>Nama Karyawan</label>
    <input id="fName" placeholder="Nama lengkap">
    <label>Divisi</label>
    <select id="fDept">
      <option value="AGENSI/代理">AGENSI/代理</option>
      <option value="CHECKING/風控">CHECKING/風控</option>
      <option value="BERKAS/文件">BERKAS/文件</option>
      <option value="AKAD 3LOAN/KTA對保">AKAD 3LOAN/KTA對保</option>
      <option value="ASISTEN SALES/業務助理">ASISTEN SALES/業務助理</option>
      <option value="MARKETING 3LOAN/KTA業務">MARKETING 3LOAN/KTA業務</option>
      <option value="MARKETING 2LOAN/二貸業務">MARKETING 2LOAN/二貸業務</option>
      <option value="CUSTOMER SERVICE/瑞卡">CUSTOMER SERVICE/瑞卡</option>
      <option value="AKUNTANSI/會計">AKUNTANSI/會計</option>
      <option value="AKAD 2LOAN/二貸對保">AKAD 2LOAN/二貸對保</option>
      <option value="ANALIS 2LOAN/二貸風控">ANALIS 2LOAN/二貸風控</option>
      <option value="KEUANGAN/財務">KEUANGAN/財務</option>
      <option value="PENAGIHAN/催收">PENAGIHAN/催收</option>
    </select>
    <label>Warna Avatar</label>
    <input id="fColor" type="color" value="#6c63ff">
    <hr style="border:none;border-top:1.5px solid #e0e4ec;margin:16px 0">
    <h4 style="color:#4a5568;font-size:0.9rem;margin-bottom:8px">Tugas</h4>
    <div id="taskFields">
      <div class="task-input-group" style="background:#f5f7fa;border:1.5px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:8px">
        <input id="tTitle0" placeholder="Judul tugas" style="margin-bottom:6px">
        <textarea id="tPrompt0" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px"></textarea>
        <input id="tLink0" placeholder="Link Google Drive">
      </div>
    </div>
    <button class="btn" style="width:100%;margin-top:4px" onclick="addTaskField()">+ Tambah tugas</button>
    <div class="modal-actions">
      <button onclick="closeModal()">Batal</button>
      <button class="primary" id="modalSaveBtn" onclick="saveEmployee()">Simpan</button>
    </div>
  </div>
</div>

<script>
// ===== AIRTABLE CONFIG (base64 encoded token to avoid redaction) =====
const b64 = "cGF0cUhkUUZ1QUJIRjBwM0IuNDVmMTVlYzQ2NmMzYjgxY2U5OTU3OWJkZmMyZjdjY2FmOWRmYWRmYjdlOWRlMDE5NTBjOGFhY2E4MTJmMmM5ZA==";
const AIRTABLE_TOKEN = atob(b64);
const AIRTABLE_BASE = "appEw0z34X7M6i8I4";
const AIRTABLE_TABLE = "Karyawan";
const AIRTABLE_URL = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`;

function airFetch(method, body) {
  return fetch(AIRTABLE_URL + (method==='GET'?'':'?typecast=true'), {
    method,
    headers: {
      'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.json());
}

let data = [];
let loading = true;

let editingIndex = -1;
let taskCounter = 1;

const DEPT_COLORS = {
  'AGENSI/代理':'#e53e3e','CHECKING/風控':'#d69e2e','BERKAS/文件':'#38a169',
  'AKAD 3LOAN/KTA對保':'#3182ce','ASISTEN SALES/業務助理':'#805ad5',
  'MARKETING 3LOAN/KTA業務':'#dd6b20','MARKETING 2LOAN/二貸業務':'#319795',
  'CUSTOMER SERVICE/瑞卡':'#e53e3e','AKUNTANSI/會計':'#d69e2e',
  'AKAD 2LOAN/二貸對保':'#38a169','ANALIS 2LOAN/二貸風控':'#3182ce',
  'KEUANGAN/財務':'#805ad5','PENAGIHAN/催收':'#dd6b20','Lainnya':'#718096'
};
// ===== LOAD FROM AIRTABLE =====
async function loadData() {
  loading = true;
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('statsContainer').style.display = 'none';
  document.getElementById('empGrid').style.display = 'none';

  try {
    let result = await airFetch('GET');
    let records = result.records || [];
    data = records.map(r => ({
      id: r.id,
      name: r.fields.Nama || '',
      dept: r.fields.Divisi || 'Lainnya',
      color: r.fields.Warna || '#6c63ff',
      tasks: parseTasks(r.fields.Tugas)
    }));
  } catch(e) {
    console.error('Airtable load error:', e);
    data = [];
  }

  loading = false;
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('statsContainer').style.display = 'grid';
  document.getElementById('empGrid').style.display = 'grid';
  render();
}

function parseTasks(tugasField) {
  if (!tugasField) return [{title:'Belum ada tugas', prompt:'', link:''}];
  try {
    return JSON.parse(tugasField);
  } catch(e) {
    return [{title: tugasField.slice(0,50), prompt: tugasField, link:''}];
  }
}

// ===== RENDER =====
function getDepts() {
  const d = {};
  data.forEach(e => { if(!d[e.dept]) d[e.dept] = []; d[e.dept].push(e); });
  return d;
}

function render() {
  renderStats();
  renderEmployees();
}

function renderStats() {
  const depts = getDepts();
  const container = document.getElementById('statsContainer');
  const active = document.querySelector('.stat-card.active')?.dataset?.dept || 'all';
  let html = '';
  const total = data.length;
  html += `<div class="stat-card ${active==='all'?'active':''}" data-dept="all" onclick="filterDept('all')" style="--accent:#6c63ff">
    <div class="count">${total}</div>
    <div class="label"> Semua</div>
    <div class="sub">${Object.keys(depts).length} Divisi</div>
  </div>`;
  Object.keys(DEPT_COLORS).forEach(d => {
    if(!depts[d]) return;
    const c = depts[d].length;
    const t = depts[d].reduce((s, e) => s + e.tasks.length, 0);
    html += `<div class="stat-card ${active===d?'active':''}" data-dept="${d}" onclick="filterDept('${d}')" style="--accent:${DEPT_COLORS[d]}">
      <div class="count">${c}</div>
      <div class="label"> ${d}</div>
      <div class="sub">${t} Tugas</div>
    </div>`;
  });
  container.innerHTML = html;
  document.getElementById('headerCount').textContent = `${total} Karyawan - ${Object.keys(depts).length} Divisi`;
}

let currentFilter = 'all';
function filterDept(dept) {
  currentFilter = dept;
  renderStats();
  renderEmployees();
}

function renderEmployees() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = data;
  if(currentFilter !== 'all') list = list.filter(e => e.dept === currentFilter);
  if(q) list = list.filter(e => e.name.toLowerCase().includes(q));

  const container = document.getElementById('empGrid');
  let html = '';
  list.forEach((e, i) => {
    const initials = e.name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    const realIdx = data.indexOf(e);
    html += `<div class="emp-card" onclick="showTasks(${realIdx})">
      <div class="avatar" style="background:${e.color}">${initials}</div>
      <div class="info">
        <div class="name">${e.name}</div>
        <div class="dept"> ${e.dept}</div>
      </div>
      <div class="task-count">${e.tasks.length} tugas</div>
    </div>`;
  });
  container.innerHTML = html;
  document.getElementById('totalCount').textContent = `${list.length} dari ${data.length} karyawan ditampilkan`;
}

let selectedEmpIdx = -1;
function showTasks(idx) {
  selectedEmpIdx = idx;
  const e = data[idx];
  const panel = document.getElementById('taskPanel');
  let html = `<div class="panel-header">
    <div>
      <h2>${e.name}</h2>
      <span class="dept-tag" style="background:${e.color}"> ${e.dept} - ${e.tasks.length} tugas</span>
    </div>
    <button class="btn-close" onclick="closePanel()">X</button>
  </div>`;
  e.tasks.forEach((t, i) => {
    html += `<div class="task-card">
      <div class="task-num">Tugas ${i+1} dari ${e.tasks.length}</div>
      <div class="task-title">${t.title}</div>
      <div class="task-prompt">${t.prompt || ''}</div>
      ${t.link ? `<a class="task-link" href="${t.link}" target="_blank">Buka Link Google Drive</a>` : ''}
      <div class="task-actions">
        <button onclick="editTask(${idx}, ${i})">Edit</button>
        <button onclick="deleteTask(${idx}, ${i})">Hapus</button>
      </div>
    </div>`;
  });
  html += `<button class="btn primary" style="width:100%;margin-top:8px" onclick="addTaskToEmp(${idx})">+ Tambah Tugas</button>`;
  panel.innerHTML = html;
  panel.classList.add('visible');
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

function closePanel() {
  document.getElementById('taskPanel').classList.remove('visible');
  selectedEmpIdx = -1;
}

// ===== AIRTABLE WRITE HELPERS =====
function makeFields(e) {
  return {
    Nama: e.name,
    Divisi: e.dept,
    Warna: e.color,
    Tugas: JSON.stringify(e.tasks, null, 2)
  };
}

// ===== CRUD =====
function openModal(mode, empIdx) {
  document.getElementById('modal').classList.add('open');
  if(mode === 'add') {
    editingIndex = -1;
    document.getElementById('modalTitle').textContent = 'Tambah Karyawan Baru';
    document.getElementById('fName').value = '';
    document.getElementById('fDept').value = 'Finance';
    document.getElementById('fColor').value = '#6c63ff';
    document.getElementById('tTitle0').value = '';
    document.getElementById('tPrompt0').value = '';
    document.getElementById('tLink0').value = '';
    taskCounter = 1;
    const c = document.getElementById('taskFields');
    c.innerHTML = `<div class="task-input-group" style="background:#f5f7fa;border:1.5px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:8px">
      <input id="tTitle0" placeholder="Judul tugas" style="margin-bottom:6px">
      <textarea id="tPrompt0" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px"></textarea>
      <input id="tLink0" placeholder="Link Google Drive">
    </div>`;
    document.getElementById('modalSaveBtn').textContent = 'Tambah';
  }
  if(mode === 'edit' && empIdx >= 0) {
    editingIndex = empIdx;
    const e = data[empIdx];
    document.getElementById('modalTitle').textContent = 'Edit Karyawan';
    document.getElementById('fName').value = e.name;
    document.getElementById('fDept').value = e.dept;
    document.getElementById('fColor').value = e.color;
    taskCounter = 0;
    const c = document.getElementById('taskFields');
    c.innerHTML = '';
    e.tasks.forEach((t, i) => {
      const idx = taskCounter++;
      const div = document.createElement('div');
      div.className = 'task-input-group';
      div.style = 'background:#f5f7fa;border:1.5px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:8px';
      div.innerHTML = `
        <input id="tTitle${idx}" placeholder="Judul tugas" value="${t.title.replace(/"/g,'&quot;')}" style="margin-bottom:6px">
        <textarea id="tPrompt${idx}" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px">${(t.prompt||'').replace(/"/g,'&quot;')}</textarea>
        <input id="tLink${idx}" placeholder="Link Google Drive" value="${(t.link||'').replace(/"/g,'&quot;')}">
        <button class="btn danger" style="margin-top:6px;font-size:0.75rem;padding:4px 10px" onclick="this.parentElement.remove()">X Hapus</button>`;
      c.appendChild(div);
    });
    document.getElementById('modalSaveBtn').textContent = 'Simpan';
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function addTaskField() {
  const i = taskCounter++;
  const c = document.getElementById('taskFields');
  const div = document.createElement('div');
  div.className = 'task-input-group';
  div.style = 'background:#f5f7fa;border:1.5px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:8px';
  div.innerHTML = `
    <input id="tTitle${i}" placeholder="Judul tugas" style="margin-bottom:6px">
    <textarea id="tPrompt${i}" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px"></textarea>
    <input id="tLink${i}" placeholder="Link Google Drive">
    <button class="btn danger" style="margin-top:6px;font-size:0.75rem;padding:4px 10px" onclick="this.parentElement.remove()">X Hapus</button>`;
  c.appendChild(div);
}

function collectTasks() {
  const tasks = [];
  let i = 0;
  while(document.getElementById(`tTitle${i}`)) {
    const title = document.getElementById(`tTitle${i}`).value.trim();
    if(title) {
      tasks.push({
        title,
        prompt: document.getElementById(`tPrompt${i}`).value.trim(),
        link: document.getElementById(`tLink${i}`).value.trim()
      });
    }
    i++;
  }
  return tasks;
}

async function saveEmployee() {
  const name = document.getElementById('fName').value.trim();
  const dept = document.getElementById('fDept').value;
  const color = document.getElementById('fColor').value;
  const tasks = collectTasks();
  if(!name) { alert('Nama karyawan harus diisi!'); return; }
  if(tasks.length === 0) { alert('Minimal 1 tugas harus diisi!'); return; }

  const fields = {Nama: name, Divisi: dept, Warna: color, Tugas: JSON.stringify(tasks, null, 2)};
  const btn = document.getElementById('modalSaveBtn');
  btn.textContent = 'Menyimpan...';
  btn.disabled = true;

  try {
    if(editingIndex >= 0) {
      const id = data[editingIndex].id;
      await airFetch('PATCH', {records: [{id, fields}]});
      data[editingIndex] = {...data[editingIndex], name, dept, color, tasks};
    } else {
      const result = await airFetch('POST', {records: [{fields}]});
      const rec = result.records?.[0];
      if(rec) data.push({id: rec.id, name, dept, color, tasks});
    }
    closeModal();
    render();
    const idx = data.findIndex(e => e.name === name);
    if(idx >= 0) showTasks(idx);
  } catch(e) {
    alert('Gagal menyimpan: ' + e.message);
  }
  btn.textContent = editingIndex >= 0 ? 'Simpan' : 'Tambah';
  btn.disabled = false;
}

async function addTaskToEmp(idx) {
  const title = prompt('Judul tugas:');
  if(!title) return;
  const promptText = prompt('Deskripsi/ prompt:');
  const link = prompt('Link Google Drive (opsional):');
  data[idx].tasks.push({title, prompt: promptText || '', link: link || ''});
  try {
    await airFetch('PATCH', {records: [{id: data[idx].id, fields: makeFields(data[idx])}]});
  } catch(e) { console.error(e); }
  showTasks(idx);
  renderStats();
  renderEmployees();
}

async function editTask(empIdx, taskIdx) {
  const t = data[empIdx].tasks[taskIdx];
  const title = prompt('Judul tugas:', t.title);
  if(!title) return;
  const promptText = prompt('Deskripsi/ prompt:', t.prompt);
  const link = prompt('Link Google Drive:', t.link);
  data[empIdx].tasks[taskIdx] = {title, prompt: promptText || '', link: link || ''};
  try {
    await airFetch('PATCH', {records: [{id: data[empIdx].id, fields: makeFields(data[empIdx])}]});
  } catch(e) { console.error(e); }
  showTasks(empIdx);
}

async function deleteTask(empIdx, taskIdx) {
  if(!confirm('Hapus tugas ini?')) return;
  data[empIdx].tasks.splice(taskIdx, 1);
  if(data[empIdx].tasks.length === 0) {
    if(!confirm('Karyawan tidak punya tugas lagi. Hapus karyawan juga?')) {
      data[empIdx].tasks.push({title:'Tugas baru', prompt:'Isi deskripsi tugas', link:''});
    } else {
      const id = data[empIdx].id;
      await airFetch('DELETE', {records: [id]});
      data.splice(empIdx, 1);
      render();
      closePanel();
      return;
    }
  }
  try {
    await airFetch('PATCH', {records: [{id: data[empIdx].id, fields: makeFields(data[empIdx])}]});
  } catch(e) { console.error(e); }
  showTasks(empIdx);
  renderStats();
  renderEmployees();
}

function exportData() {
  const exportArr = data.map(e => ({name: e.name, dept: e.dept, color: e.color, tasks: e.tasks}));
  const blob = new Blob([JSON.stringify(exportArr, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prompt-ai-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const d = JSON.parse(e.target.result);
      if(!Array.isArray(d)) throw 'invalid';
      const records = d.map(item => ({
        fields: {Nama: item.name, Divisi: item.dept, Warna: item.color, Tugas: JSON.stringify(item.tasks, null, 2)}
      }));
      for(let i = 0; i < records.length; i += 10) {
        const batch = records.slice(i, i + 10);
        await airFetch('POST', {records: batch});
      }
      alert(`Berhasil import ${d.length} karyawan!`);
      await loadData();
    } catch(err) {
      alert('File JSON tidak valid.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== LANGUAGE TOGGLE =====
function toggleLang() {
  const isZh = document.body.classList.toggle('lang-zh');
  document.getElementById('langToggle').textContent = isZh ? 'IND' : '中文';
  localStorage.setItem('taskTrackerLang', isZh ? 'zh' : 'id');
}
// Load saved language
if(localStorage.getItem('taskTrackerLang') === 'zh') {
  document.body.classList.add('lang-zh');
  document.getElementById('langToggle').textContent = 'IND';
}

loadData();
</script>
</body>
</html>
