<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT AI — Task Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0d1117;
  min-height: 100vh;
  color: #e6edf3;
  padding: 24px;
}
.container { max-width: 1400px; margin: 0 auto; }

/* ── ANIMATED GRADIENT HEADER ── */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  position: relative;
}
.header h1 {
  font-size: 2.8rem;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(270deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #bc8cff, #ff6b6b);
  background-size: 600% 600%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientMove 6s ease infinite;
  text-shadow: none;
  position: relative;
  z-index: 1;
}
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.header h1::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 3px;
  background: linear-gradient(270deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #bc8cff);
  border-radius: 2px;
  background-size: 400% 400%;
  animation: gradientMove 4s ease infinite;
  -webkit-text-fill-color: transparent; /* fallback */
}
.header p {
  color: #8b949e;
  font-size: 1rem;
  margin-top: 12px;
}
.header .badge {
  display: inline-block;
  background: rgba(88,166,255,0.1);
  border: 1px solid rgba(88,166,255,0.3);
  color: #58a6ff;
  font-size: 0.75rem;
  padding: 4px 14px;
  border-radius: 20px;
  margin-top: 8px;
  font-weight: 500;
}
.divider { height: 2px; background: linear-gradient(90deg, transparent, #30363d, transparent); margin: 16px 0 24px; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px 16px;
  color: #e6edf3;
  font-size: 0.9rem;
  outline: none;
  transition: border 0.2s;
}
.search-box:focus { border-color: #58a6ff; }
.search-box::placeholder { color: #484f58; }

.toolbar .btn {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.toolbar .btn:hover { background: #30363d; border-color: #58a6ff; }
.toolbar .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
.toolbar .btn.primary:hover { background: #2ea043; }
.toolbar .btn.danger { background: #8b1a1a; border-color: #da3633; color: #fff; }
.toolbar .btn.danger:hover { background: #da3633; }
.toolbar .total-count { color: #8b949e; font-size: 0.85rem; margin-left: auto; white-space: nowrap; }

/* ── STATS CARDS (slimmer for 50+ employees) ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 4px solid var(--accent, #58a6ff);
}
.stat-card:hover { background: #1c2333; border-color: var(--accent, #58a6ff); transform: translateY(-1px); }
.stat-card.active {
  background: rgba(88,166,255,0.06);
  border-color: var(--accent, #58a6ff);
  box-shadow: 0 0 0 1px var(--accent, #58a6ff);
}
.stat-card .label { font-size: 0.78rem; font-weight: 600; color: #e6edf3; }
.stat-card .count { font-size: 1.5rem; font-weight: 700; color: var(--accent, #58a6ff); margin: 2px 0; }
.stat-card .sub { font-size: 0.65rem; color: #8b949e; }

/* ── EMPLOYEE GRID ── */
.employee-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.emp-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.emp-card:hover { background: #1c2333; border-color: #58a6ff; transform: translateY(-1px); }
.emp-card.active { border-color: #58a6ff; background: rgba(88,166,255,0.06); }
.emp-card .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem;
  color: #fff; flex-shrink: 0;
}
.emp-card .info { flex: 1; min-width: 0; }
.emp-card .name { font-size: 0.85rem; font-weight: 600; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-card .dept { font-size: 0.7rem; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-card .task-count { font-size: 0.7rem; color: #58a6ff; flex-shrink: 0; }

/* ── TASK PANEL ── */
.task-panel {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 24px;
  margin-top: 16px;
  display: none;
}
.task-panel.visible { display: block; }
.task-panel .panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.task-panel .panel-header h2 { font-size: 1.2rem; font-weight: 700; color: #f0f6fc; }
.task-panel .panel-header .dept-tag {
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 12px;
  font-weight: 500;
  color: #fff;
}
.task-panel .panel-header .btn-close {
  background: none; border: none; color: #8b949e;
  font-size: 1.5rem; cursor: pointer;
}
.task-panel .panel-header .btn-close:hover { color: #f85149; }

.task-card {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.task-card .task-title { font-size: 0.9rem; font-weight: 600; color: #f0f6fc; margin-bottom: 4px; }
.task-card .task-num { font-size: 0.7rem; color: #58a6ff; font-weight: 500; margin-bottom: 8px; }
.task-card .task-prompt { font-size: 0.82rem; color: #c9d1d9; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
.task-card .task-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: #1f2937; color: #58a6ff;
  padding: 6px 14px; border-radius: 6px;
  font-size: 0.8rem; text-decoration: none;
  border: 1px solid #30363d;
  transition: all 0.2s;
}
.task-card .task-link:hover { background: #2d3748; border-color: #58a6ff; }
.task-card .task-actions { margin-top: 10px; display: flex; gap: 8px; }
.task-card .task-actions button {
  border: 1px solid #30363d; background: #21262d; color: #8b949e;
  padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem;
}
.task-card .task-actions button:hover { border-color: #58a6ff; color: #58a6ff; }

/* ── MODAL ── */
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}
.modal.open { display: flex; }
.modal-content {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 14px; padding: 28px; width: 90%; max-width: 560px;
  max-height: 85vh; overflow-y: auto;
}
.modal-content h3 { font-size: 1.2rem; font-weight: 700; color: #f0f6fc; margin-bottom: 16px; }
.modal-content label { display: block; font-size: 0.82rem; font-weight: 500; color: #c9d1d9; margin-bottom: 4px; margin-top: 12px; }
.modal-content input,.modal-content textarea,.modal-content select {
  width: 100%; background: #0d1117; border: 1px solid #30363d;
  border-radius: 8px; padding: 10px 12px; color: #e6edf3;
  font-size: 0.85rem; outline: none; font-family: inherit;
}
.modal-content input:focus,.modal-content textarea:focus { border-color: #58a6ff; }
.modal-content textarea { min-height: 80px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-actions button {
  border: 1px solid #30363d; background: #21262d; color: #e6edf3;
  padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500;
}
.modal-actions button:hover { border-color: #58a6ff; }
.modal-actions button.primary { background: #238636; border-color: #2ea043; color: #fff; }
.modal-actions button.primary:hover { background: #2ea043; }
.modal-actions button.danger { background: #8b1a1a; border-color: #da3633; color: #fff; }
.modal-actions button.danger:hover { background: #da3633; }

.file-input-wrap { position: relative; }
.file-input-wrap input[type=file] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; }

@media (max-width: 600px) {
  body { padding: 12px; }
  .header h1 { font-size: 1.8rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .employee-grid { grid-template-columns: 1fr 1fr; }
  .toolbar { flex-direction: column; }
  .toolbar .total-count { margin-left: 0; }
}
</style>
</head>

    <div class="modal-actions">

      <button class="primary" id="modalSaveBtn" onclick="saveEmployee()">Simpan</button>

  </div>
</div>

function saveData() {
  localStorage.setItem('promptAI_data', JSON.stringify(data));
}

function getDepts() {
  const d = {};
  data.forEach(e => { if(!d[e.dept]) d[e.dept] = []; d[e.dept].push(e); });
  return d;
}

function render() {
  renderStats();
  renderEmployees();
  updateCount();
}

function renderStats() {
  const depts = getDepts();
  const container = document.getElementById('statsContainer');
  const active = document.querySelector('.stat-card.active')?.dataset?.dept || 'all';
  let html = '';
  const total = data.length;
  html += `<div class="stat-card ${active==='all'?'active':''}" data-dept="all" onclick="filterDept('all')" style="--accent:#8b949e">
    <div class="count">${total}</div>
    <div class="label">👥 Semua</div>
    <div class="sub">${Object.keys(depts).length} Divisi</div>
  </div>`;
  Object.keys(DEPT_COLORS).forEach(d => {
    if(!depts[d]) return;
    const c = depts[d].length;
    const t = depts[d].reduce((s, e) => s + e.tasks.length, 0);
    html += `<div class="stat-card ${active===d?'active':''}" data-dept="${d}" onclick="filterDept('${d}')" style="--accent:${DEPT_COLORS[d]}">
      <div class="count">${c}</div>
      <div class="label">${DEPT_ICONS[d]} ${d}</div>
      <div class="sub">${t} Tugas</div>
    </div>`;
  });
  container.innerHTML = html;
  document.getElementById('headerCount').textContent = `${total} Karyawan · ${Object.keys(depts).length} Divisi`;
}

let currentFilter = 'all';
function filterDept(dept) {
  currentFilter = dept;
  renderStats();
  renderEmployees();
}

function renderEmployees() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = data;
  if(currentFilter !== 'all') list = list.filter(e => e.dept === currentFilter);
  if(q) list = list.filter(e => e.name.toLowerCase().includes(q));

  const container = document.getElementById('empGrid');
  let html = '';
  list.forEach((e, i) => {
    const idx = data.indexOf(e);
    const initials = e.name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    html += `<div class="emp-card" onclick="showTasks(${idx})">
      <div class="avatar" style="background:${e.color}">${initials}</div>
      <div class="info">
        <div class="name">${e.name}</div>
        <div class="dept">${DEPT_ICONS[e.dept]} ${e.dept}</div>
      </div>
      <div class="task-count">${e.tasks.length} tugas</div>
    </div>`;
  });
  container.innerHTML = html;

  document.getElementById('totalCount').textContent = `${list.length} dari ${data.length} karyawan ditampilkan`;
}

let selectedEmpIdx = -1;
function showTasks(idx) {
  selectedEmpIdx = idx;
  const e = data[idx];
  const panel = document.getElementById('taskPanel');
  let html = `<div class="panel-header">
    <div>
      <h2>${e.name}</h2>
      <span class="dept-tag" style="background:${e.color}">${DEPT_ICONS[e.dept]} ${e.dept} · ${e.tasks.length} tugas</span>
    </div>
    <button class="btn-close" onclick="closePanel()">✕</button>
  </div>`;
  e.tasks.forEach((t, i) => {
    html += `<div class="task-card">
      <div class="task-num">Tugas ${i+1} dari ${e.tasks.length}</div>
      <div class="task-title">${t.title}</div>
      <div class="task-prompt">${t.prompt}</div>
      ${t.link ? `<a class="task-link" href="${t.link}" target="_blank">🔗 Buka Link Google Drive</a>` : ''}
      <div class="task-actions">
        <button onclick="editTask(${idx}, ${i})">✏️ Edit</button>
        <button onclick="deleteTask(${idx}, ${i})">🗑 Hapus</button>
      </div>
    </div>`;
  });
  html += `<button class="btn primary" style="width:100%;margin-top:8px" onclick="addTaskToEmp(${idx})">+ Tambah Tugas</button>`;
  panel.innerHTML = html;
  panel.classList.add('visible');
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

function closePanel() {
  document.getElementById('taskPanel').classList.remove('visible');
  selectedEmpIdx = -1;
}

// CRUD
function openModal(mode, empIdx) {
  document.getElementById('modal').classList.add('open');
  if(mode === 'add') {
    editingIndex = -1;
    document.getElementById('modalTitle').textContent = 'Tambah Karyawan Baru';
    document.getElementById('fName').value = '';
    document.getElementById('fDept').value = 'Finance';
    document.getElementById('fColor').value = '#58a6ff';
    document.getElementById('tTitle0').value = '';
    document.getElementById('tPrompt0').value = '';
    document.getElementById('tLink0').value = '';
    taskCounter = 1;
    const c = document.getElementById('taskFields');
    c.innerHTML = `<div class="task-input-group" style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px;margin-bottom:8px">
      <input id="tTitle0" placeholder="Judul tugas" style="margin-bottom:6px">
      <textarea id="tPrompt0" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px"></textarea>
      <input id="tLink0" placeholder="Link Google Drive">
    </div>`;
    document.getElementById('modalSaveBtn').textContent = 'Tambah';
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function addTaskField() {
  const i = taskCounter++;
  const c = document.getElementById('taskFields');
  const div = document.createElement('div');
  div.className = 'task-input-group';
  div.style = 'background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px;margin-bottom:8px';
  div.innerHTML = `
    <input id="tTitle${i}" placeholder="Judul tugas" style="margin-bottom:6px">
    <textarea id="tPrompt${i}" placeholder="Prompt / deskripsi tugas" style="margin-bottom:6px"></textarea>
    <input id="tLink${i}" placeholder="Link Google Drive">
    <button class="btn danger" style="margin-top:6px;font-size:0.75rem;padding:4px 10px" onclick="this.parentElement.remove()">✕ Hapus</button>`;
  c.appendChild(div);
}

function collectTasks() {
  const tasks = [];
  let i = 0;
  while(document.getElementById(`tTitle${i}`)) {
    const title = document.getElementById(`tTitle${i}`).value.trim();
    if(title) {
      tasks.push({
        title,
        prompt: document.getElementById(`tPrompt${i}`).value.trim(),
        link: document.getElementById(`tLink${i}`).value.trim()
      });
    }
    i++;
  }
  return tasks;
}

function saveEmployee() {
  const name = document.getElementById('fName').value.trim();
  const dept = document.getElementById('fDept').value;
  const color = document.getElementById('fColor').value;
  const tasks = collectTasks();
  if(!name) { alert('Nama karyawan harus diisi!'); return; }
  if(tasks.length === 0) { alert('Minimal 1 tugas harus diisi!'); return; }

  if(editingIndex >= 0) {
    data[editingIndex] = {name, dept, color, tasks};
  } else {
    data.push({name, dept, color, tasks});
  }
  saveData();
  closeModal();
  render();
  const idx = data.findIndex(e => e.name === name);
  if(idx >= 0) showTasks(idx);
}

function addTaskToEmp(idx) {
  const title = prompt('Judul tugas:');
  if(!title) return;
  const promptText = prompt('Deskripsi/ prompt:');
  const link = prompt('Link Google Drive (opsional):');
  data[idx].tasks.push({title, prompt: promptText || '', link: link || ''});
  saveData();
  showTasks(idx);
  renderStats();
  renderEmployees();
}

function editTask(empIdx, taskIdx) {
  const t = data[empIdx].tasks[taskIdx];
  const title = prompt('Judul tugas:', t.title);
  if(!title) return;
  const promptText = prompt('Deskripsi/ prompt:', t.prompt);
  const link = prompt('Link Google Drive:', t.link);
  data[empIdx].tasks[taskIdx] = {title, prompt: promptText || '', link: link || ''};
  saveData();
  showTasks(empIdx);
}

function deleteTask(empIdx, taskIdx) {
  if(!confirm('Hapus tugas ini?')) return;
  data[empIdx].tasks.splice(taskIdx, 1);
  if(data[empIdx].tasks.length === 0) {
    if(!confirm('Karyawan tidak punya tugas lagi. Hapus karyawan juga?')) {
      data[empIdx].tasks.push({title:'Tugas baru', prompt:'Isi deskripsi tugas', link:''});
    } else {
      data.splice(empIdx, 1);
      saveData();
      render();
      closePanel();
      return;
    }
  }
  saveData();
  showTasks(empIdx);
  renderStats();
  renderEmployees();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prompt-ai-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if(!Array.isArray(d)) throw 'invalid';
      data = d;
      saveData();
      render();
      alert(`✅ Berhasil import ${data.length} karyawan!`);
    } catch(err) {
      alert('❌ File JSON tidak valid.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

render();
</script>
