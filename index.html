<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT AI — Task Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  color: #fff;
  padding: 20px;
}

/* Animated Background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 50%, rgba(255,107,107,0.08) 0%, transparent 50%),
              radial-gradient(circle at 80% 50%, rgba(72,202,228,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 20px;
  position: relative;
}

.header h1 {
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 4s ease infinite;
  letter-spacing: -1px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.header p {
  color: rgba(255,255,255,0.6);
  font-size: 1.1rem;
  margin-top: 10px;
  font-weight: 500;
}

/* Stats Cards */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%; right: -50%; bottom: -50%;
  background: conic-gradient(from var(--angle, 0deg), transparent, var(--glow-color, rgba(255,255,255,0.1)), transparent);
  animation: rotateGlow 4s linear infinite;
}

@keyframes rotateGlow {
  to { --angle: 360deg; }
}

@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.stat-card:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--glow-color, rgba(255,255,255,0.3));
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px var(--glow-color, transparent);
}

.stat-card .emoji { font-size: 2rem; margin-bottom: 8px; }
.stat-card .label { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 500; }
.stat-card .count { font-size: 1.5rem; font-weight: 800; margin-top: 4px; }
.stat-card .tasks-total { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.stat-card.active {
  border-color: var(--glow-color);
  box-shadow: 0 0 20px var(--glow-color), inset 0 0 20px rgba(255,255,255,0.05);
}

/* Colors per stat */
.stat-card[data-divisi="Finance"] { --glow-color: #ff6b6b; }
.stat-card[data-divisi="Accounting"] { --glow-color: #ffd93d; }
.stat-card[data-divisi="Perpajakan"] { --glow-color: #6bcb77; }
.stat-card[data-divisi="Legal & Admin"] { --glow-color: #4d96ff; }
.stat-card[data-divisi="Semua"] { --glow-color: #9b59b6; }

/* Search */
.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-bar input {
  flex: 1;
  min-width: 200px;
  padding: 14px 20px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color: #fff;
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  transition: all 0.3s;
}

.search-bar input:focus {
  outline: none;
  border-color: #4d96ff;
  box-shadow: 0 0 20px rgba(77,150,255,0.2);
}

.search-bar input::placeholder { color: rgba(255,255,255,0.3); }

.btn {
  padding: 14px 24px;
  border: none;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #4d96ff, #9b59b6);
  color: #fff;
  box-shadow: 0 4px 15px rgba(77,150,255,0.3);
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(77,150,255,0.4); }

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
}

.btn-secondary:hover { background: rgba(255,255,255,0.15); }

.btn-success { background: linear-gradient(135deg, #6bcb77, #2d9e3f); color: #fff; box-shadow: 0 4px 15px rgba(107,203,119,0.3); }
.btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
.btn-warning { background: linear-gradient(135deg, #ffd93d, #f0932b); color: #1a1a2e; }

/* Employee Grid */
.employee-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.emp-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.emp-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--card-color, #4d96ff), var(--card-color2, #9b59b6));
  opacity: 0.7;
}

.emp-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.emp-card .name { font-size: 1.1rem; font-weight: 700; }
.emp-card .divisi { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.emp-card .task-count { 
  position: absolute; top: 16px; right: 16px;
  background: var(--card-color, #4d96ff);
  color: #fff;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
}

/* Task Detail Panel */
.task-panel {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 30px;
  margin-top: 20px;
  display: none;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-panel.show { display: block; }

.task-panel .panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.task-panel .panel-title { font-size: 1.3rem; font-weight: 700; }
.task-panel .panel-subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.5); }

.task-card {
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  border-left: 3px solid var(--card-color, #4d96ff);
  transition: all 0.3s;
}

.task-card:hover { background: rgba(0,0,0,0.3); }

.task-card .task-title {
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 8px;
  color: var(--card-color, #4d96ff);
}

.task-card .task-prompt {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.75);
  line-height: 1.6;
  margin-bottom: 12px;
}

.task-card .task-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: rgba(77,150,255,0.15);
  border: 1px solid rgba(77,150,255,0.3);
  border-radius: 8px;
  color: #4d96ff;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.3s;
}

.task-card .task-link:hover {
  background: rgba(77,150,255,0.25);
  border-color: #4d96ff;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

.modal h3 { font-size: 1.3rem; margin-bottom: 20px; }

.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  margin-bottom: 12px;
  transition: all 0.3s;
}

.modal input:focus, .modal textarea:focus, .modal select:focus {
  outline: none;
  border-color: #4d96ff;
  box-shadow: 0 0 15px rgba(77,150,255,0.15);
}

.modal textarea { min-height: 80px; resize: vertical; }
.modal label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; display: block; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.modal-actions .btn { flex: 1; justify-content: center; }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: rgba(255,255,255,0.4);
}

.empty .emoji { font-size: 4rem; margin-bottom: 16px; }
.empty p { font-size: 1.1rem; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  padding: 16px 24px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.9rem;
  z-index: 2000;
  animation: slideUp 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.toast.success { background: linear-gradient(135deg, #6bcb77, #2d9e3f); color: #fff; }
.toast.error { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
.toast.info { background: linear-gradient(135deg, #4d96ff, #9b59b6); color: #fff; }

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 2rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .employee-grid { grid-template-columns: 1fr; }
  .search-bar { flex-direction: column; }
  .search-bar .btn { width: 100%; justify-content: center; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚀 PROMPT AI</h1>
    <p>Task Management — Finance Department</p>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsContainer"></div>

  <!-- Search & Actions -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 Cari karyawan..." oninput="renderCards()">
    <button class="btn btn-primary" onclick="openModal()">➕ Tambah Karyawan</button>
    <button class="btn btn-secondary" onclick="exportData()">⬇️ Export JSON</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importInput').click()">⬆️ Import JSON</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>

  <!-- Employee Grid -->
  <div class="employee-grid" id="empGrid"></div>

  <!-- Task Panel -->
  <div class="task-panel" id="taskPanel"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">Tambah Karyawan</h3>
    <form id="modalForm">
      <label>Nama Karyawan</label>
      <input type="text" id="inputNama" placeholder="Nama lengkap" required>
      
      <label>Divisi</label>
      <select id="inputDivisi">
        <option value="Finance">💰 Finance</option>
        <option value="Accounting">📊 Accounting</option>
        <option value="Perpajakan">🧾 Perpajakan</option>
        <option value="Legal & Admin">⚖️ Legal & Admin</option>
      </select>

      <label>Judul Tugas 1</label>
      <input type="text" id="inputJudul1" placeholder="Contoh: Laporan Arus Kas">

      <label>Prompt / Deskripsi Tugas 1</label>
      <textarea id="inputPrompt1" placeholder="Deskripsi tugas..."></textarea>

      <label>Link Google Drive 1</label>
      <input type="url" id="inputLink1" placeholder="https://drive.google.com/...">

      <label>Judul Tugas 2 (opsional)</label>
      <input type="text" id="inputJudul2" placeholder="Contoh: Rekonsiliasi Bank">

      <label>Prompt / Deskripsi Tugas 2</label>
      <textarea id="inputPrompt2" placeholder="Deskripsi tugas..."></textarea>

      <label>Link Google Drive 2</label>
      <input type="url" id="inputLink2" placeholder="https://drive.google.com/...">

      <input type="hidden" id="editId" value="">
      <div class="modal-actions">
        <button type="submit" class="btn btn-success" id="modalSubmit">✅ Simpan</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">❌ Batal</button>
      </div>
    </form>
  </div>
</div>

<script>
let DATA = JSON.parse(localStorage.getItem('promptAiData')) || {
  "Finance": {
    "emoji": "💰",
    "color": "#ff6b6b",
    "color2": "#ee5a24",
    "employees": [
      { "name": "Rina Amelia", "tasks": [{"judul": "Laporan Arus Kas Harian", "prompt": "Menyusun laporan arus kas harian dalam IDR & USD", "link": "https://drive.google.com"}] },
      { "name": "Budi Santoso", "tasks": [{"judul": "Rekonsiliasi Bank", "prompt": "Rekonsiliasi bank bulan Juni 2026", "link": "https://drive.google.com"}] }
    ]
  },
  "Accounting": {
    "emoji": "📊",
    "color": "#ffd93d",
    "color2": "#f0932b",
    "employees": [
      { "name": "Dewi Lestari", "tasks": [{"judul": "Jurnal Penyesuaian", "prompt": "Membuat jurnal penyesuaian akhir bulan", "link": "https://drive.google.com"}] }
    ]
  },
  "Perpajakan": {
    "emoji": "🧾",
    "color": "#6bcb77",
    "color2": "#2d9e3f",
    "employees": [
      { "name": "Ahmad Fauzi", "tasks": [{"judul": "PPh 21 Tahunan", "prompt": "Menyiapkan data PPh 21 pegawai", "link": "https://drive.google.com"}, {"judul": "PPN Masa", "prompt": "Rekap PPN masa Juni", "link": "https://drive.google.com"}] }
    ]
  },
  "Legal & Admin": {
    "emoji": "⚖️",
    "color": "#4d96ff",
    "color2": "#3742fa",
    "employees": [
      { "name": "Dimas Anggara", "tasks": [{"judul": "Review Kontrak Vendor", "prompt": "Review kontrak vendor IT support", "link": "https://drive.google.com"}] }
    ]
  }
};

function saveData() {
  localStorage.setItem('promptAiData', JSON.stringify(DATA));
  renderCards();
  renderStats();
}

function renderStats() {
  const container = document.getElementById('statsContainer');
  const total = Object.values(DATA).reduce((sum, d) => sum + d.employees.reduce((s, e) => s + e.tasks.length, 0), 0);
  const allEmps = Object.values(DATA).reduce((sum, d) => sum + d.employees.length, 0);
  let html = `<div class="stat-card" data-divisi="Semua" onclick="filterDivisi=''; renderCards(); document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active')); this.classList.add('active')" style="--glow-color:#9b59b6">
    <div class="emoji">📋</div>
    <div class="label">Semua Divisi</div>
    <div class="count">${allEmps}</div>
    <div class="tasks-total">${total} tugas</div>
  </div>`;
  Object.entries(DATA).forEach(([divisi, d]) => {
    const taskCount = d.employees.reduce((s, e) => s + e.tasks.length, 0);
    const empCount = d.employees.length;
    html += `<div class="stat-card" data-divisi="${divisi}" onclick="filterDivisi='${divisi}'; renderCards(); document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active')); this.classList.add('active')" style="--glow-color:${d.color}">
      <div class="emoji">${d.emoji}</div>
      <div class="label">${divisi}</div>
      <div class="count">${empCount}</div>
      <div class="tasks-total">${taskCount} tugas</div>
    </div>`;
  });
  container.innerHTML = html;
}

let filterDivisi = '';

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const container = document.getElementById('empGrid');
  let html = '';
  Object.entries(DATA).forEach(([divisi, d]) => {
    if (filterDivisi && filterDivisi !== divisi) return;
    d.employees.forEach((emp, ei) => {
      if (!emp.name.toLowerCase().includes(q)) return;
      const taskCount = emp.tasks.length;
      html += `<div class="emp-card" onclick="showTasks('${divisi}', ${ei})" style="--card-color:${d.color}; --card-color2:${d.color2}">
        <div class="name">${d.emoji} ${emp.name}</div>
        <div class="divisi">${divisi}</div>
        <div class="task-count">${taskCount}</div>
      </div>`;
    });
  });
  if (!html) {
    html = '<div class="empty"><div class="emoji">🔍</div><p>Tidak ada karyawan ditemukan</p><p style="font-size:0.85rem;margin-top:4px">Coba keyword lain atau tambah data baru</p></div>';
  }
  container.innerHTML = html;
}

let selectedDivisi = '', selectedEmpIdx = -1;

function showTasks(divisi, empIdx) {
  selectedDivisi = divisi;
  selectedEmpIdx = empIdx;
  const emp = DATA[divisi].employees[empIdx];
  const d = DATA[divisi];
  const panel = document.getElementById('taskPanel');
  let html = `<div class="panel-header">
    <div>
      <div class="panel-title">${d.emoji} ${emp.name}</div>
      <div class="panel-subtitle">${divisi}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" style="padding:8px 16px;font-size:0.8rem" onclick="addTask('${divisi}', ${empIdx})">➕ Tambah Tugas</button>
      <button class="btn btn-warning btn-sm" style="padding:8px 16px;font-size:0.8rem" onclick="editEmp('${divisi}', ${empIdx})">✏️ Edit</button>
      <button class="btn btn-danger btn-sm" style="padding:8px 16px;font-size:0.8rem" onclick="deleteEmp('${divisi}', ${empIdx})">🗑️ Hapus</button>
    </div>
  </div>`;
  
  emp.tasks.forEach((task, ti) => {
    html += `<div class="task-card" style="--card-color:${d.color}">
      <div class="task-title">📌 ${task.judul}</div>
      <div class="task-prompt">${task.prompt}</div>
      ${task.link ? `<a href="${task.link}" target="_blank" class="task-link">🔗 Buka Google Drive</a>` : ''}
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" style="padding:4px 12px;font-size:0.75rem" onclick="editTask('${divisi}', ${empIdx}, ${ti})">✏️</button>
        <button class="btn btn-danger btn-sm" style="padding:4px 12px;font-size:0.75rem" onclick="deleteTask('${divisi}', ${empIdx}, ${ti})">🗑️</button>
      </div>
    </div>`;
  });
  
  if (emp.tasks.length === 0) {
    html += '<div class="empty"><div class="emoji">📭</div><p>Belum ada tugas</p></div>';
  }
  
  panel.innerHTML = html;
  panel.classList.add('show');
  
  // Scroll to panel
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openModal(divisi, empIdx, taskIdx) {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('inputNama').value = '';
  document.getElementById('inputDivisi').value = 'Finance';
  document.getElementById('inputJudul1').value = '';
  document.getElementById('inputPrompt1').value = '';
  document.getElementById('inputLink1').value = '';
  document.getElementById('inputJudul2').value = '';
  document.getElementById('inputPrompt2').value = '';
  document.getElementById('inputLink2').value = '';
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = '➕ Tambah Karyawan Baru';
  document.getElementById('modalSubmit').textContent = '✅ Simpan';
}

function editEmp(divisi, empIdx) {
  const emp = DATA[divisi].employees[empIdx];
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('inputNama').value = emp.name;
  document.getElementById('inputDivisi').value = divisi;
  document.getElementById('inputJudul1').value = emp.tasks[0]?.judul || '';
  document.getElementById('inputPrompt1').value = emp.tasks[0]?.prompt || '';
  document.getElementById('inputLink1').value = emp.tasks[0]?.link || '';
  document.getElementById('inputJudul2').value = emp.tasks[1]?.judul || '';
  document.getElementById('inputPrompt2').value = emp.tasks[1]?.prompt || '';
  document.getElementById('inputLink2').value = emp.tasks[1]?.link || '';
  document.getElementById('editId').value = `${divisi}|${empIdx}`;
  document.getElementById('modalTitle').textContent = '✏️ Edit Karyawan';
  document.getElementById('modalSubmit').textContent = '✅ Update';
}

document.getElementById('modalForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const nama = document.getElementById('inputNama').value.trim();
  const divisi = document.getElementById('inputDivisi').value;
  const judul1 = document.getElementById('inputJudul1').value.trim();
  const prompt1 = document.getElementById('inputPrompt1').value.trim();
  const link1 = document.getElementById('inputLink1').value.trim();
  const judul2 = document.getElementById('inputJudul2').value.trim();
  const prompt2 = document.getElementById('inputPrompt2').value.trim();
  const link2 = document.getElementById('inputLink2').value.trim();
  const editId = document.getElementById('editId').value;
  
  if (!nama) return showToast('Nama harus diisi', 'error');
  if (!judul1) return showToast('Minimal 1 tugas harus diisi', 'error');
  
  const tasks = [];
  tasks.push({ judul: judul1, prompt: prompt1, link: link1 });
  if (judul2) tasks.push({ judul: judul2, prompt: prompt2, link: link2 });
  
  if (editId) {
    const [oldDiv, oldIdx] = editId.split('|');
    const oldEmp = DATA[oldDiv].employees[parseInt(oldIdx)];
    if (oldDiv === divisi) {
      DATA[oldDiv].employees[parseInt(oldIdx)] = { name: nama, tasks };
    } else {
      DATA[oldDiv].employees.splice(parseInt(oldIdx), 1);
      if (!DATA[divisi]) {
        const emojis = { 'Finance':'💰','Accounting':'📊','Perpajakan':'🧾','Legal & Admin':'⚖️' };
        const colors = { 'Finance':'#ff6b6b','Accounting':'#ffd93d','Perpajakan':'#6bcb77','Legal & Admin':'#4d96ff' };
        DATA[divisi] = { emoji: emojis[divisi] || '📋', color: colors[divisi] || '#4d96ff', color2: colors[divisi] || '#4d96ff', employees: [] };
      }
      DATA[divisi].employees.push({ name: nama, tasks });
    }
    showToast('Karyawan diupdate', 'success');
  } else {
    if (!DATA[divisi]) {
      const emojis = { 'Finance':'💰','Accounting':'📊','Perpajakan':'🧾','Legal & Admin':'⚖️' };
      const colors = { 'Finance':'#ff6b6b','Accounting':'#ffd93d','Perpajakan':'#6bcb77','Legal & Admin':'#4d96ff' };
      DATA[divisi] = { emoji: emojis[divisi] || '📋', color: colors[divisi] || '#4d96ff', color2: colors[divisi] || '#4d96ff', employees: [] };
    }
    DATA[divisi].employees.push({ name: nama, tasks });
    showToast('Karyawan ditambahkan', 'success');
  }
  
  closeModal();
  saveData();
  renderStats();
  renderCards();
  document.getElementById('taskPanel').classList.remove('show');
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function addTask(divisi, empIdx) {
  const judul = prompt('Judul tugas baru:');
  if (!judul) return;
  const promptText = prompt('Deskripsi prompt:');
  const link = prompt('Link Google Drive (opsional):');
  DATA[divisi].employees[empIdx].tasks.push({ judul, prompt: promptText || '', link: link || '' });
  saveData();
  showTasks(divisi, empIdx);
  showToast('Tugas ditambahkan', 'success');
}

function editTask(divisi, empIdx, taskIdx) {
  const task = DATA[divisi].employees[empIdx].tasks[taskIdx];
  const judul = prompt('Judul tugas:', task.judul);
  if (!judul) return;
  const promptText = prompt('Deskripsi prompt:', task.prompt);
  const link = prompt('Link Google Drive:', task.link);
  DATA[divisi].employees[empIdx].tasks[taskIdx] = { judul, prompt: promptText || '', link: link || '' };
  saveData();
  showTasks(divisi, empIdx);
  showToast('Tugas diupdate', 'success');
}

function deleteTask(divisi, empIdx, taskIdx) {
  if (!confirm('Hapus tugas ini?')) return;
  DATA[divisi].employees[empIdx].tasks.splice(taskIdx, 1);
  saveData();
  showTasks(divisi, empIdx);
  showToast('Tugas dihapus', 'info');
}

function deleteEmp(divisi, empIdx) {
  if (!confirm(`Hapus ${DATA[divisi].employees[empIdx].name}?`)) return;
  DATA[divisi].employees.splice(empIdx, 1);
  saveData();
  document.getElementById('taskPanel').classList.remove('show');
  showToast('Karyawan dihapus', 'info');
}

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prompt-ai-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('Data diexport', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      DATA = data;
      saveData();
      document.getElementById('taskPanel').classList.remove('show');
      showToast('Data diimport!', 'success');
    } catch (err) {
      showToast('File JSON tidak valid', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Init
renderStats();
renderCards();
</script>
</body>
</html>
